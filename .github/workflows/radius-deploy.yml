name: Deploy Radius Application
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Radius environment name'
        required: true
        default: 'dev'

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Make package public
        run: |
          curl -s -X PATCH -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')/visibility" \
            -d '{"visibility":"public"}' || echo "Could not set package visibility"

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'v0.1.4'

      - name: Get AKS Credentials
        run: |
          az aks get-credentials --name "${{ vars.RADIUS_K8S_CLUSTER }}" --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" --overwrite-existing --admin

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=default || echo "Secret already exists"

      - name: Install Radius CLI
        run: |
          wget -q "https://raw.githubusercontent.com/radius-project/radius/main/deploy/install.sh" -O - | /bin/bash

      - name: Install Radius Control Plane
        run: |
          rad install kubernetes --set rp.publicEndpointOverride=localhost || echo "Radius already installed, continuing..."

      - name: Setup Radius Environment
        run: |
          rad workspace create kubernetes default
          rad group create default
          rad group switch default
          rad env create "dev" --namespace "default" || echo "Environment already exists"
          rad env switch "dev"
          rad credential register azure wi --client-id "${{ secrets.AZURE_CLIENT_ID }}" --tenant-id "${{ secrets.AZURE_TENANT_ID }}"
          rad env update "dev" --azure-subscription-id "${{ secrets.AZURE_SUBSCRIPTION_ID }}" --azure-resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"

      - name: Register Recipes
        run: |
          rad recipe register default --resource-type Applications.Datastores/sqlDatabases --template-kind bicep --template-path ghcr.io/radius-project/recipes/local-dev/sqldatabases:latest --environment dev || echo "Recipe may already exist"

      - name: Deploy Application
        run: |
          if [ -f ".radius/app.bicep" ]; then
            rad deploy ".radius/app.bicep" --environment "dev"
          elif [ -f "app.bicep" ]; then
            rad deploy "app.bicep" --environment "dev"
          else
            echo "No app.bicep found"; exit 1
          fi

      - name: Show Application Status
        run: |
          rad app status -a todo-list-app-demo
          rad resource list --output table